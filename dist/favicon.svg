<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Norwegian flag base -->
  <rect width="32" height="32" fill="#BA0C2F"/>
  <!-- White cross -->
  <rect x="0" y="12" width="32" height="8" fill="#fff"/>
  <rect x="10" y="0" width="8" height="32" fill="#fff"/>
  <!-- Blue cross -->
  <rect x="0" y="13.5" width="32" height="5" fill="#00205B"/>
  <rect x="11.5" y="0" width="5" height="32" fill="#00205B"/>
  <!-- US canton (top-left) blended with Norwegian cross -->
  <rect x="0" y="0" width="10" height="12" fill="#3C3B6E" opacity="0.88"/>
  <!-- Stars (simplified 3x2 grid) -->
  <circle cx="2.5" cy="2.5" r="0.8" fill="#fff"/>
  <circle cx="5" cy="2.5" r="0.8" fill="#fff"/>
  <circle cx="7.5" cy="2.5" r="0.8" fill="#fff"/>
  <circle cx="2.5" cy="5" r="0.8" fill="#fff"/>
  <circle cx="5" cy="5" r="0.8" fill="#fff"/>
  <circle cx="7.5" cy="5" r="0.8" fill="#fff"/>
  <circle cx="2.5" cy="7.5" r="0.8" fill="#fff"/>
  <circle cx="5" cy="7.5" r="0.8" fill="#fff"/>
  <circle cx="7.5" cy="7.5" r="0.8" fill="#fff"/>
  <circle cx="2.5" cy="10" r="0.8" fill="#fff"/>
  <circle cx="5" cy="10" r="0.8" fill="#fff"/>
  <circle cx="7.5" cy="10" r="0.8" fill="#fff"/>
</svg>
