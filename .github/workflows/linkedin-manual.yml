name: Post to LinkedIn (manual)

# Manual trigger for posting to LinkedIn when the blog is already live
# but the LinkedIn post was missed or needs to be re-posted.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post slug (e.g., 000003-ai-agent-governance-framework)'
        required: true
        type: string
      dry_run:
        description: 'Dry run only (do not actually post)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout editorial repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Post to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          SLUG="${{ inputs.slug }}"
          POST_FILE=$(ls content/published/ | grep "^${SLUG}" | head -1)

          if [ -z "$POST_FILE" ]; then
            echo "No published post found for ${SLUG}."
            exit 1
          fi

          ARGS="--post content/published/${POST_FILE} --variant medium"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Posting LinkedIn for ${SLUG}"
          node scripts/post-to-linkedin.mjs $ARGS

      - name: Move LinkedIn post to published
        if: inputs.dry_run == false
        run: |
          SLUG="${{ inputs.slug }}"
          LINKEDIN_POST=$(ls content/linkedin/posts/ 2>/dev/null | grep "^${SLUG}" | head -1)

          if [ -n "$LINKEDIN_POST" ]; then
            mkdir -p content/linkedin/published
            mv "content/linkedin/posts/${LINKEDIN_POST}" "content/linkedin/published/${LINKEDIN_POST}"
          fi

          git config user.name "publish-bot[bot]"
          git config user.email "publish-bot[bot]@users.noreply.github.com"
          git add -A
          git commit -m "bot: linkedin posted ${SLUG}" || true
          git push || true
