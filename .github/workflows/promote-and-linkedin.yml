name: Publish Blog and Post to LinkedIn

# Schedule: Wed+Sat at noon CET. Manual dispatch anytime.
# Full chain: promote to public repo → wait for deploy → post to LinkedIn
#
# Logic:
# 1. Find next approved post (from queue or manual slug input)
# 2. If not yet in content/published/ → promote to public repo
# 3. If LinkedIn post exists in linkedin/posts/ → wait for deploy, then post
# 4. Move LinkedIn post to linkedin/published/

on:
  schedule:
    - cron: '0 10 * * 3,6'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post slug to publish (e.g., 000045-spring-cleaning-cloud-finops)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'bot:')

    steps:
      - name: Checkout editorial repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      # ── Step 1: Find the post to publish ────────────────────
      - name: Detect post
        id: detect
        run: |
          if [ -n "${{ inputs.slug }}" ]; then
            SLUG="${{ inputs.slug }}"
          else
            SLUG=$(node -e "
              const fs = require('fs');
              const q = JSON.parse(fs.readFileSync('data/publish-queue.json','utf-8'));
              if (!Array.isArray(q.queue)) process.exit(0);
              const published = fs.existsSync('content/published') ? fs.readdirSync('content/published') : [];
              const linkedinPublished = fs.existsSync('content/linkedin/published') ? fs.readdirSync('content/linkedin/published') : [];
              const next = q.queue.find(item => {
                if (!item.approved || !item.slug) return false;
                const blogDone = published.some(f => f.startsWith(item.slug));
                const linkedinDone = linkedinPublished.some(f => f.startsWith(item.slug));
                return !blogDone || !linkedinDone;
              });
              if (next) console.log(next.slug);
            ")
          fi

          if [ -z "$SLUG" ]; then
            echo "No post needs publishing. Done."
            exit 0
          fi

          # Check what needs to happen
          NEEDS_PROMOTE="false"
          NEEDS_LINKEDIN="false"

          if ! ls content/published/ 2>/dev/null | grep -q "^${SLUG}"; then
            if ls content/posts/ 2>/dev/null | grep -q "^${SLUG}"; then
              NEEDS_PROMOTE="true"
            fi
          fi

          if ls content/linkedin/posts/ 2>/dev/null | grep -q "^${SLUG}"; then
            NEEDS_LINKEDIN="true"
          fi

          if [ "$NEEDS_PROMOTE" = "false" ] && [ "$NEEDS_LINKEDIN" = "false" ]; then
            echo "Post ${SLUG} is fully published (blog + LinkedIn). Nothing to do."
            exit 0
          fi

          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "needs_promote=${NEEDS_PROMOTE}" >> "$GITHUB_OUTPUT"
          echo "needs_linkedin=${NEEDS_LINKEDIN}" >> "$GITHUB_OUTPUT"
          echo "Slug: ${SLUG} | Promote: ${NEEDS_PROMOTE} | LinkedIn: ${NEEDS_LINKEDIN}"

      # ── Step 2: Promote to public repo (if needed) ──────────
      - name: Promote blog post
        id: promote
        if: steps.detect.outputs.needs_promote == 'true'
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          SLUG="${{ steps.detect.outputs.slug }}"
          POST_FILE=$(ls content/posts/ | grep "^${SLUG}" | head -1)

          # Update status and date
          sed -i "s/^status: .*/status: published/" "content/posts/${POST_FILE}"
          sed -i "s/^publishDate: .*/publishDate: $(date -u +%Y-%m-%d)/" "content/posts/${POST_FILE}"

          # Move to published
          cp "content/posts/${POST_FILE}" "content/published/${POST_FILE}"
          rm "content/posts/${POST_FILE}"
          echo "Moved to content/published/${POST_FILE}"

          # Commit to editorial repo
          git config user.name "publish-bot[bot]"
          git config user.email "publish-bot[bot]@users.noreply.github.com"
          git add -A
          git commit -m "bot: publish ${SLUG}"
          git push

          # Push to public repo
          PUBLIC_REPO="FallenHoot/olinske"
          git clone "https://x-access-token:${PUBLIC_REPO_PAT}@github.com/${PUBLIC_REPO}.git" public-target
          cp "content/published/${POST_FILE}" "public-target/content/published/${POST_FILE}"
          cd public-target
          git config user.name "publish-bot[bot]"
          git config user.email "publish-bot[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push to public repo."
          else
            git commit -m "Promote ${SLUG}"
            git push
            echo "Public repo updated. Azure deploy will trigger."
          fi

          echo "promoted=true" >> "$GITHUB_OUTPUT"

      # ── Step 3: Wait for blog to deploy (only if we just promoted) ──
      - name: Wait for blog to deploy
        if: steps.promote.outputs.promoted == 'true' && steps.detect.outputs.needs_linkedin == 'true'
        run: |
          echo "Waiting 60 minutes for Azure to deploy the blog..."
          echo "Started at: $(date -u)"
          sleep 3600
          echo "Wait complete at: $(date -u)"

      - name: Validate LinkedIn post guardrails
        if: steps.detect.outputs.needs_linkedin == 'true'
        run: |
          SLUG="${{ steps.detect.outputs.slug }}"
          POST_FILE=$(ls content/published/ | grep "^${SLUG}" | head -1)

          echo "Validating LinkedIn guardrails for ${SLUG}"
          node scripts/post-to-linkedin.mjs --post "content/published/${POST_FILE}" --variant medium --dry-run

      # ── Step 4: Post to LinkedIn (if needed) ────────────────
      - name: Post to LinkedIn
        if: steps.detect.outputs.needs_linkedin == 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          SLUG="${{ steps.detect.outputs.slug }}"
          POST_FILE=$(ls content/published/ | grep "^${SLUG}" | head -1)

          echo "Posting LinkedIn for ${SLUG}"
          node scripts/post-to-linkedin.mjs --post "content/published/${POST_FILE}" --variant medium

      # ── Step 5: Move LinkedIn post to published ─────────────
      - name: Move LinkedIn post to published
        if: steps.detect.outputs.needs_linkedin == 'true'
        run: |
          SLUG="${{ steps.detect.outputs.slug }}"
          LINKEDIN_POST=$(ls content/linkedin/posts/ 2>/dev/null | grep "^${SLUG}" | head -1)

          if [ -n "$LINKEDIN_POST" ]; then
            mkdir -p content/linkedin/published
            mv "content/linkedin/posts/${LINKEDIN_POST}" "content/linkedin/published/${LINKEDIN_POST}"
          fi

          git config user.name "publish-bot[bot]"
          git config user.email "publish-bot[bot]@users.noreply.github.com"
          git add -A
          git commit -m "bot: linkedin posted ${SLUG}" || true
          git push || true
